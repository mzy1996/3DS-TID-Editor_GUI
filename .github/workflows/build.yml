name: 编译 ExHeader 工具
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 MinGW
        run: choco install mingw -y

      - name: 编译 EXE
        run: gcc -static -mconsole main.c -o 3DS_TitleID_Editor.exe -luser32 -lcomdlg32

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: ExhTitleID_GUI
          path: ExhTitleID_GUI.exe
